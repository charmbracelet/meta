name: lint
on:
  workflow_call:
    inputs:
      directory:
        type: string
        required: false
        description: Path to the directory to run golangci-lint in.
      golangci_path:
        type: string
        required: false
        description: Path to golangci.yml
      golangci_version:
        type: string
        required: false
        description: Version of golangci-lint to use.
      timeout:
        type: string
        required: false
        description: Timeout for golangci-lint.
      pre-run:
        type: string
        required: false
        description: Command to run before golangci-lint, e.g. to generate code.

permissions:
  # Required: allow read access to the content for analysis.
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  pull-requests: read
  # Optional: allow write access to checks to allow the action to annotate code in the PR.
  checks: write

jobs:
  lint:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # By default, the GitHub Action on Windows uses `core.autocrlf=true`.
      # LF is converted to CRLF, this produces reports from formatters (gofmt/gofumpt/etc.).
      - run: "git config --global core.autocrlf input"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ${{ github.repository }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: charmbracelet/meta
          path: charmbracelet/meta
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Pre-run command
        if: ${{ inputs.pre-run != '' }}
        working-directory: ${{ format('{0}/{1}', github.repository, inputs.directory || '') }}
        run: ${{ inputs.pre-run }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          working-directory: ${{ format('{0}/{1}', github.repository, inputs.directory || '') }}
          args: |
            --config="${{ inputs.golangci_path || format('{0}/{1}/meta/golangci.yml', github.workspace, github.repository_owner) }}" --timeout=${{ inputs.timeout || '5m' }} ./...
          version: ${{ inputs.golangci_version || 'latest' }}
